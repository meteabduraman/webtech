    runs-on: ubuntu-latest
    steps:
      - name: Fetch
        uses: JamesIves/fetch-api-data-action@v2.4.2
        with:
          endpoint: ${{secrets.ENDPOINT}}
          configuration: '{ "method": "GET", "headers": { "Authorization": "Bearer ${{ secrets.API_TOKEN }}" } }'

      - name: Check output
        run: echo '${{ steps.GetEmailsAndCodes.outputs.fetchApiData }}'
          

